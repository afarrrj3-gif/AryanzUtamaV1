<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AryanzUtama</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{

background-image:
linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),
url("https://res.cloudinary.com/dtdodhqqi/image/upload/v1773940915/a0c855f3c5b538ff083075f066e578ae_bjtdfa.jpg");

background-size:cover;
background-attachment:fixed;
color:white;
}

/* banner */

.banner{
width:100%;
position:relative;
}

.banner img{
width:100%;
display:block;
}

/* fade banner */

.fade{
height:120px;

background:linear-gradient(
to bottom,
rgba(0,0,0,0),
rgba(0,0,0,0.5),
rgba(0,0,0,0.8)
);

margin-top:-5px;
}

/* profile */

.profile{
text-align:center;
margin-top:-70px;
position:relative;
z-index:10;
}

.profile img{
width:120px;
height:120px;
border-radius:50%;
border:6px solid white;
}

/* title */

.title{
margin-top:6px;
font-size:26px;
font-weight:700;
}

/* social */

.social{
margin-top:2px;
display:flex;
justify-content:center;
gap:10px;
}

.social a{
font-size:24px;
color:white;
text-decoration:none;
}

/* menu */

.menu{
padding:20px;
max-width:500px;
margin:auto;
}

.row{
display:flex;
gap:15px;
margin-bottom:15px;
}

.row a{
flex:1;
}

.btn{
display:block;
width:100%;
padding:18px;
border-radius:14px;
background:#2b567f;
text-align:center;
font-size:18px;
font-weight:700;
text-decoration:none;
color:white;
transition:0.2s;
}

.btn:hover{
transform:scale(1.04);
background:#3470a6;
}

.full{
margin-bottom:15px;
}

/* popup */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:#2b567f;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
}

.popup-box textarea,
.popup-box input{
width:100%;
margin-bottom:10px;
padding:10px;
border:none;
border-radius:6px;
}

.popup-box button{
width:100%;
padding:12px;
border:none;
background:#0fa4ff;
color:white;
border-radius:6px;
font-weight:bold;
}

</style>

</head>
<body>

<!-- banner -->

<div class="banner">
<img src="https://res.cloudinary.com/dtdodhqqi/image/upload/v1773940535/b1046ff4b891d9b46cb07bfa9f897558_jsvldr.jpg">
</div>

<div class="fade"></div>

<!-- profile -->

<div class="profile">

<img src="https://res.cloudinary.com/dtdodhqqi/image/upload/v1773940535/b1046ff4b891d9b46cb07bfa9f897558_jsvldr.jpg">

<div class="title">
AryanzUtama
</div>

<div class="social">
<a href="#">📷</a>
<a href="#">💬</a>
</div>

</div>

<!-- menu -->

<div class="menu">

<div class="row">
<a class="btn">Jual Akun FF</a>
<a class="btn">Jual Akun ML</a>
</div>

<div class="row">
<a class="btn">Jasa Amanin Akun FF</a>
<a class="btn">Jasa Amanin Akun ML</a>
</div>

<a class="btn full" onclick="openPopup()">Jasa Posting (JP)</a>

<a class="btn full">Semua Grup / Saluran AryanzUtama</a>

<a class="btn full">Kritik & Saran</a>

</div>

<!-- popup -->

<div class="popup" id="popup">

<div class="popup-box">

<h3>Kirim Format JP</h3>

<textarea placeholder="Tulis format JP"></textarea>

<input type="file">

<button>Kirim</button>

</div>

</div>

<script>

function openPopup(){
document.getElementById("popup").style.display="flex";
}

window.onclick=function(e){
if(e.target.id==="popup"){
document.getElementById("popup").style.display="none";
}
}

</script>

</body>
</html>
