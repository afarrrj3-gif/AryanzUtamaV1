<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AryanzUtama</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;

/* background garis tipis seperti banner */

background:
repeating-linear-gradient(
135deg,
#0c2f55,
#0c2f55 20px,
#0c2f55 21px,
#ffffff22 22px
);
}

/* banner */

.banner{
position:relative;
}

.banner img{
width:100%;
height:220px;
object-fit:cover;
}

/* icon */

.logo{
position:absolute;
left:50%;
bottom:-45px;
transform:translateX(-50%);
}

.logo img{
width:90px;
height:90px;
border-radius:50%;
border:4px solid #0c2f55;
}

/* container */

.container{
padding-top:55px;
width:90%;
margin:auto;
}

/* nama */

.name{
font-size:22px;
font-weight:bold;
margin-top:4px;
}

/* sosmed */

.social{
margin-top:2px;
margin-bottom:15px;
}

.social img{
width:26px;
margin:0 6px;
filter:grayscale(100%);
cursor:pointer;
}

/* grid jasa */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:10px;
}

.card{
background:#153e6b;
padding:14px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

/* full card */

.full-card{
background:#153e6b;
padding:14px;
border-radius:10px;
margin-top:12px;
cursor:pointer;
}

/* small */

.small-card{
background:#153e6b;
padding:10px;
border-radius:8px;
margin-top:12px;
font-size:14px;
cursor:pointer;
}

/* popup */

.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#0e2b4a;
padding:20px;
width:85%;
max-width:400px;
border-radius:12px;
z-index:10;
}

.popup textarea,.popup input{
width:100%;
margin-top:8px;
padding:8px;
border:none;
border-radius:6px;
}

.popup button{
margin-top:10px;
padding:10px;
border:none;
background:#1f6fb5;
border-radius:6px;
cursor:pointer;
}

/* overlay */

.overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:5;
}

</style>
</head>

<body>

<div class="banner">

<img src="https://res.cloudinary.com/dtdodhqqi/image/upload/v1766772767/IMG-20251128-WA0091_ldbe9l.jpg">

<div class="logo">
<img src="https://res.cloudinary.com/dtdodhqqi/image/upload/v1766845910/IMG-20251128-WA0094_1_rrrhdn.jpg">
</div>

</div>

<div class="container">

<div class="name">AryanzUtama</div>

<div class="social">

<a href="https://www.instagram.com/aryanz_stok?igsh=MW80bzZpOHRtcjBmbA==" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/9/95/Instagram_logo_2022.svg">
</a>

<a href="https://wa.me/6289509506039" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
</a>

</div>

<div class="grid">

<div class="card" onclick="openPopup()">Jual Akun FF</div>
<div class="card" onclick="openPopup()">Jual Akun ML</div>

<div class="card" onclick="openPopup()">Jasa Amanin Akun FF</div>
<div class="card" onclick="openPopup()">Jasa Amanin Akun ML</div>

</div>

<div class="full-card" onclick="openPopup()">Jasa Posting (JP)</div>

<div class="full-card" onclick="openPopup()">Semua Grup / Saluran AryanzUtama</div>

<div class="small-card" onclick="openPopup()">Kritik & Saran</div>

</div>

<div class="overlay" id="overlay" onclick="closePopup()"></div>

<div class="popup" id="popup">

<h3>Layanan</h3>
<p>Isi popup nanti kita buat khusus untuk layanan ini.</p>

<button onclick="closePopup()">Tutup</button>

</div>

<script>

function openPopup(){
document.getElementById("popup").style.display="block"
document.getElementById("overlay").style.display="block"
}

function closePopup(){
document.getElementById("popup").style.display="none"
document.getElementById("overlay").style.display="none"
}

</script>

</body>
</html>
