<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AryanzUtama</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:url("https://res.cloudinary.com/dtdodhqqi/image/upload/v1773940915/a0c855f3c5b538ff083075f066e578ae_bjtdfa.jpg");
background-size:cover;
background-attachment:fixed;
color:white;
}

/* BANNER */

.banner{
position:relative;
width:100%;
}

.banner img{
width:100%;
display:block;
}

/* FADE HALUS */

.fade{
height:120px;
background:linear-gradient(
to bottom,
rgba(0,0,0,0),
rgba(0,0,0,0.45),
rgba(0,0,0,0.7)
);
margin-top:-5px;
}

/* PROFILE */

.profile{
text-align:center;
margin-top:-70px;
position:relative;
z-index:5;
}

.profile img{
width:120px;
height:120px;
border-radius:50%;
border:6px solid white;
}

/* TITLE */

.title{
margin-top:8px;
font-size:26px;
font-weight:700;
}

/* SOCIAL */

.social{
margin-top:4px;
display:flex;
justify-content:center;
gap:12px;
}

.social a{
font-size:26px;
color:white;
text-decoration:none;
}

/* BUTTON AREA */

.menu{
padding:20px;
max-width:500px;
margin:auto;
}

.row{
display:flex;
gap:15px;
margin-bottom:15px;
}

.row a{
flex:1;
}

.btn{
display:block;
width:100%;
padding:18px;
border-radius:14px;
background:#1e4f7a;
text-align:center;
font-size:18px;
font-weight:700;
text-decoration:none;
color:white;
transition:0.2s;
}

.btn:hover{
transform:scale(1.03);
background:#266aa5;
}

.full{
margin-bottom:15px;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
z-index:99;
}

.popup-box{
background:#1e4f7a;
padding:25px;
border-radius:12px;
width:90%;
max-width:400px;
}

.popup-box h3{
margin-bottom:15px;
}

.popup-box textarea,
.popup-box input{
width:100%;
margin-bottom:10px;
padding:10px;
border-radius:6px;
border:none;
}

.popup-box button{
width:100%;
padding:12px;
border:none;
background:#0fa4ff;
color:white;
border-radius:6px;
font-weight:bold;
}

</style>

</head>
<body>


<!-- BANNER -->

<div class="banner">
<img src="https://res.cloudinary.com/dtdodhqqi/image/upload/v1773940535/b1046ff4b891d9b46cb07bfa9f897558_jsvldr.jpg">
</div>

<div class="fade"></div>


<!-- PROFILE -->

<div class="profile">

<img src="https://res.cloudinary.com/dtdodhqqi/image/upload/v1773940535/b1046ff4b891d9b46cb07bfa9f897558_jsvldr.jpg">

<div class="title">
AryanzUtama
</div>

<div class="social">
<a href="#">📷</a>
<a href="#">💬</a>
</div>

</div>


<!-- MENU -->

<div class="menu">

<div class="row">
<a href="#" class="btn">Jual Akun FF</a>
<a href="#" class="btn">Jual Akun ML</a>
</div>

<div class="row">
<a href="#" class="btn">Jasa Amanin Akun FF</a>
<a href="#" class="btn">Jasa Amanin Akun ML</a>
</div>

<a href="#" class="btn full" onclick="openPopup()">Jasa Posting (JP)</a>

<a href="#" class="btn full">Semua Grup / Saluran AryanzUtama</a>

<a href="#" class="btn full">Kritik & Saran</a>

</div>


<!-- POPUP JP -->

<div class="popup" id="popup">

<div class="popup-box">

<h3>Kirim Format JP</h3>

<textarea placeholder="Tulis format JP..."></textarea>

<input type="file">

<button>Kirim</button>

</div>

</div>


<script>

function openPopup(){
document.getElementById("popup").style.display="flex";
}

window.onclick=function(e){
if(e.target.id==="popup"){
document.getElementById("popup").style.display="none";
}
}

</script>

</body>
</html>
