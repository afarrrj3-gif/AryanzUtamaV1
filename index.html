<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AryanzUtama</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
color:white;
text-align:center;

/* background garis seperti banner */

background:
repeating-linear-gradient(
135deg,
#0a2c4f,
#0a2c4f 10px,
#0e3b6a 10px,
#0e3b6a 20px
);
}

/* banner */

.banner{
position:relative;
width:100%;
}

.banner img{
width:100%;
height:200px;
object-fit:cover;
}

/* icon tengah */

.logo{
position:absolute;
left:50%;
bottom:-45px;
transform:translateX(-50%);
}

.logo img{
width:90px;
height:90px;
border-radius:50%;
border:4px solid white;
}

/* container */

.container{
padding-top:60px;
width:92%;
margin:auto;
}

/* nama */

.name{
font-size:24px;
font-weight:bold;
margin-bottom:10px;
}

/* sosmed */

.social{
margin-bottom:20px;
}

.social img{
width:28px;
margin:0 8px;
filter:grayscale(100%);
cursor:pointer;
}

/* grid jasa */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.card{
background:#123e6b;
padding:14px;
border-radius:10px;
font-weight:bold;
}

/* card panjang */

.full{
background:#123e6b;
padding:14px;
border-radius:10px;
margin-top:12px;
font-weight:bold;
}

/* kecil */

.small{
background:#123e6b;
padding:10px;
border-radius:8px;
margin-top:12px;
font-size:14px;
}

</style>
</head>

<body>

<div class="banner">

<img src="https://res.cloudinary.com/dtdodhqqi/image/upload/v1766772767/IMG-20251128-WA0091_ldbe9l.jpg">

<div class="logo">
<img src="https://res.cloudinary.com/dtdodhqqi/image/upload/v1766845910/IMG-20251128-WA0094_1_rrrhdn.jpg">
</div>

</div>

<div class="container">

<div class="name">AryanzUtama</div>

<div class="social">

<a href="https://www.instagram.com/aryanz_stok?igsh=MW80bzZpOHRtcjBmbA==" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/9/95/Instagram_logo_2022.svg">
</a>

<a href="https://wa.me/6289509506039" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
</a>

</div>

<div class="grid">

<div class="card">Jual Akun FF</div>
<div class="card">Jual Akun ML</div>

<div class="card">Jasa Amanin Akun FF</div>
<div class="card">Jasa Amanin Akun ML</div>

</div>

<div class="full">
Jasa Posting (JP)
</div>

<div class="full">
Semua Grup / Saluran AryanzUtama
</div>

<div class="small">
Kritik & Saran
</div>

</div>

</body>
</html>
